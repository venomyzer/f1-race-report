# ─────────────────────────────────────────────────────────────────────────────
# application.properties  –  F1 Race Report Tool
#
# All sensitive values (passwords, API keys) are read from environment
# variables using ${ENV_VAR:default} syntax.
# Real-world analogy: this file is like an app's "control panel" – you
# configure behaviour here without touching source code.
# ─────────────────────────────────────────────────────────────────────────────

# ── SERVER ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.application.name=f1-race-report-backend

# ── POSTGRESQL DATABASE ───────────────────────────────────────────────────────
# Connection URL format: jdbc:postgresql://<host>:<port>/<database>
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/f1reportdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool settings
# Analogy: like managing taxi cabs – keep 5 ready, max 20 on road at once
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=F1ReportHikariPool

# ── JPA / HIBERNATE ──────────────────────────────────────────────────────────
# update = Hibernate auto-creates/alters tables to match @Entity classes.
# Use 'validate' in production and manage schema with Flyway/Liquibase.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── ERGAST / JOLPICA F1 API ───────────────────────────────────────────────────
# Jolpica is the maintained successor of the Ergast F1 API (same response format)
ergast.api.base-url=${ERGAST_BASE_URL:https://api.jolpi.ca/ergast/f1}
# Limit for paginated requests (Ergast default is 30; we raise it for lap data)
ergast.api.default-limit=100
# Timeout in milliseconds for external HTTP calls
ergast.api.timeout-ms=10000

# ── GROQ AI API ───────────────────────────────────────────────────────────────
# Sign up at https://console.groq.com to get a free API key
groq.api.key=${GROQ_API_KEY:your-groq-api-key-here}
groq.api.base-url=https://api.groq.com/openai/v1
# Model: llama-3.3-70b-versatile gives best quality on the free tier
groq.api.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.api.max-tokens=2048
groq.api.temperature=0.75
groq.api.timeout-ms=30000

# ── CACHE (Caffeine in-memory) ────────────────────────────────────────────────
spring.cache.type=caffeine
# TTL = 6 hours for season/race lists (they don't change often)
# maximumSize = max entries before old ones are evicted (LRU)
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=360m

# ── ACTUATOR ─────────────────────────────────────────────────────────────────
# Expose health and info endpoints for monitoring / load balancer checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── LOGGING ──────────────────────────────────────────────────────────────────
logging.level.com.f1report=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
