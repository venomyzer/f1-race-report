<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/f1-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="F1 Race Report Tool – AI-powered Formula 1 race analysis with charts and journalist reports" />
    <meta name="theme-color" content="#E10600" />

    <!-- Open Graph (social sharing preview) -->
    <meta property="og:title" content="F1 Race Report Tool" />
    <meta property="og:description" content="AI-powered F1 race analysis, charts, and journalist reports" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Inter for body text, JetBrains Mono for lap times -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>F1 Race Report Tool</title>
  </head>
  <body>
    <!--
      #root is where React mounts the entire application.
      React renders everything inside this div via ReactDOM.createRoot().
      Real-world analogy: this div is the empty stage. React is the theatre
      company that builds all the sets and performs all the acts inside it.
    -->
    <div id="root"></div>

    <!--
      type="module" tells the browser to load this as an ES Module.
      Vite handles bundling during development (fast ESM) and production (Rollup).
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
